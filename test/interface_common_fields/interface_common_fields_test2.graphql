
interface BasicEntity {

    id: ID!
    createdBy: String
    creationDate: String

    animal: Animal

}

interface Animal {
    name: String
}

type Dog implements Animal {
    name: String
    age: Int
}

type Cat implements Animal {
    name: String
    hasFurr: Boolean
}

type User implements BasicEntity {
     id: ID!
    createdBy: String
    creationDate: String

    firstName: String
    lastName: String
    animal: Animal
}

type Car implements BasicEntity {
     id: ID!
    createdBy: String
    creationDate: String
    lastUpdate: String
    lastUpdateBy: String

    make: String
    model: String
    animal: Animal
}

type Query {
    getEntity: BasicEntity
}

